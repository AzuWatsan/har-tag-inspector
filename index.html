<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HAR Tag Event Inspector</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0b0f;
    --surface: #12141a;
    --surface2: #1a1d26;
    --border: #252835;
    --border2: #2e3245;
    --text: #e8eaf0;
    --text-muted: #6b7094;
    --text-dim: #3d4260;
    --accent: #4f7cff;
    --accent-glow: rgba(79,124,255,0.15);
    --accent2: #00d9a3;
    --accent2-glow: rgba(0,217,163,0.12);
    --warn: #f5a623;
    --warn-glow: rgba(245,166,35,0.12);
    --error: #ff4d6a;
    --error-glow: rgba(255,77,106,0.12);
    --info: #7c9dff;
    --ga4: #e8711a;
    --gads: #4285f4;
    --meta: #1877f2;
    --criteo: #ff6900;
    --line: #00b900;
    --msads: #00a4ef;
    --yahoo: #ff0033;
    --tiktok: #ff0050;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ─── Layout ─── */
  .app {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ─── Header ─── */
  .header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-left { display: flex; flex-direction: column; gap: 6px; }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo-text span { color: var(--accent); }
  .header-sub {
    font-size: 13px;
    color: var(--text-muted);
    font-family: var(--mono);
    margin-left: 48px;
  }
  .privacy-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--accent2);
    font-family: var(--mono);
    background: var(--accent2-glow);
    border: 1px solid rgba(0,217,163,0.2);
    padding: 6px 12px;
    border-radius: 6px;
  }

  /* ─── Upload Area ─── */
  .upload-zone {
    border: 2px dashed var(--border2);
    border-radius: 16px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    position: relative;
    margin-bottom: 24px;
  }
  .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-glow);
  }
  .upload-zone:hover {
    border-color: var(--accent);
    background: rgba(79,124,255,0.05);
  }
  .upload-icon {
    font-size: 40px;
    margin-bottom: 12px;
  }
  .upload-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .upload-sub {
    font-size: 13px;
    color: var(--text-muted);
    font-family: var(--mono);
  }
  .upload-input { display: none; }
  .file-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 14px 20px;
    margin-bottom: 24px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .file-name {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent2);
    font-weight: 500;
  }
  .file-size {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }
  .file-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ─── Buttons ─── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #3d6be8; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border2);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    padding: 6px 12px;
    font-size: 12px;
  }
  .btn-ghost:hover { color: var(--text); }
  .btn-sm { padding: 6px 14px; font-size: 12px; }
  .btn-run {
    background: linear-gradient(135deg, var(--accent), #7c4dff);
    color: #fff;
    padding: 14px 32px;
    font-size: 16px;
    border-radius: 10px;
    box-shadow: 0 4px 24px rgba(79,124,255,0.3);
  }
  .btn-run:hover { box-shadow: 0 6px 32px rgba(79,124,255,0.5); transform: translateY(-1px); }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ─── Action Row ─── */
  .action-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  /* ─── Error ─── */
  .error-box {
    background: var(--error-glow);
    border: 1px solid rgba(255,77,106,0.3);
    border-radius: 10px;
    padding: 14px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 14px;
    color: var(--error);
  }

  /* ─── Summary Cards ─── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: border-color 0.2s;
  }
  .summary-card:hover { border-color: var(--border2); }
  .summary-card.warn { border-color: rgba(245,166,35,0.3); background: var(--warn-glow); }
  .summary-card.error { border-color: rgba(255,77,106,0.3); background: var(--error-glow); }
  .summary-card.ok { border-color: rgba(0,217,163,0.2); background: var(--accent2-glow); }
  .summary-label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .summary-value {
    font-size: 30px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1px;
  }
  .summary-card.warn .summary-value { color: var(--warn); }
  .summary-card.error .summary-value { color: var(--error); }
  .summary-card.ok .summary-value { color: var(--accent2); }

  /* ─── Section Header ─── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .section-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .section-count {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ─── Filter Bar ─── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-select, .filter-input {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .filter-select:focus, .filter-input:focus { border-color: var(--accent); }
  .filter-input { min-width: 200px; }
  .filter-input::placeholder { color: var(--text-dim); }
  .filter-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 8px 12px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    background: var(--surface);
    user-select: none;
    transition: all 0.15s;
  }
  .filter-toggle:hover { color: var(--text); border-color: var(--accent); }
  .filter-toggle.active { color: var(--warn); border-color: var(--warn); background: var(--warn-glow); }
  .filter-toggle.active-err { color: var(--error); border-color: var(--error); background: var(--error-glow); }

  /* ─── Result Table ─── */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 32px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--surface2);
    padding: 12px 14px;
    text-align: left;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.expanded { background: var(--surface2); }
  tbody td {
    padding: 12px 14px;
    vertical-align: middle;
  }
  .td-platform { white-space: nowrap; }
  .td-mono {
    font-family: var(--mono);
    font-size: 12px;
  }
  .td-url {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ─── Platform Badge ─── */
  .platform-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .platform-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .badge-GA4 { background: rgba(232,113,26,0.15); color: #f0944d; }
  .badge-GA4 .platform-dot { background: var(--ga4); }
  .badge-Google-Ads { background: rgba(66,133,244,0.15); color: #6ba5f5; }
  .badge-Google-Ads .platform-dot { background: var(--gads); }
  .badge-Meta { background: rgba(24,119,242,0.15); color: #6aaaf5; }
  .badge-Meta .platform-dot { background: var(--meta); }
  .badge-Criteo { background: rgba(255,105,0,0.15); color: #ff8c3a; }
  .badge-Criteo .platform-dot { background: var(--criteo); }
  .badge-LINE { background: rgba(0,185,0,0.12); color: #3dc83d; }
  .badge-LINE .platform-dot { background: var(--line); }
  .badge-Microsoft-Ads { background: rgba(0,164,239,0.12); color: #4cc1f0; }
  .badge-Microsoft-Ads .platform-dot { background: var(--msads); }
  .badge-Yahoo-Ads { background: rgba(255,0,51,0.12); color: #ff6080; }
  .badge-Yahoo-Ads .platform-dot { background: var(--yahoo); }
  .badge-TikTok { background: rgba(255,0,80,0.12); color: #ff4d7d; }
  .badge-TikTok .platform-dot { background: var(--tiktok); }
  .badge-Unknown { background: rgba(107,112,148,0.12); color: var(--text-muted); }
  .badge-Unknown .platform-dot { background: var(--text-muted); }

  /* ─── Count Badge ─── */
  .count-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
  }
  .count-1 { background: var(--surface2); color: var(--text-muted); }
  .count-many { background: rgba(245,166,35,0.15); color: var(--warn); }

  /* ─── Status Badge ─── */
  .status-badge {
    font-family: var(--mono);
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .status-2xx { background: rgba(0,217,163,0.1); color: var(--accent2); }
  .status-3xx { background: rgba(124,157,255,0.1); color: var(--info); }
  .status-4xx { background: rgba(245,166,35,0.15); color: var(--warn); }
  .status-5xx { background: var(--error-glow); color: var(--error); }
  .status-none { color: var(--text-dim); font-family: var(--mono); font-size: 12px; }

  /* ─── Expanded Detail Row ─── */
  .detail-row td {
    background: rgba(79,124,255,0.04);
    border-bottom: 1px solid var(--border);
    padding: 0;
  }
  .detail-inner {
    padding: 16px 20px;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 16px;
  }
  .detail-item { display: flex; flex-direction: column; gap: 3px; }
  .detail-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .detail-value {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    word-break: break-all;
  }
  .detail-value.url-val { color: var(--info); font-size: 11px; }
  .params-section { margin-top: 12px; }
  .params-title {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .params-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .param-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    font-family: var(--mono);
    font-size: 11px;
  }
  .param-key { color: var(--accent); }
  .param-sep { color: var(--text-dim); }
  .param-val { color: var(--text-muted); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .param-masked { color: var(--error); font-style: italic; }
  .copy-btn {
    background: none;
    border: 1px solid var(--border2);
    border-radius: 5px;
    padding: 2px 8px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 11px;
    font-family: var(--mono);
    transition: all 0.1s;
  }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* ─── Warning Panel ─── */
  .warning-panel {
    margin-bottom: 32px;
  }
  .warning-item {
    display: flex;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 8px;
    border: 1px solid;
  }
  .warning-item.sev-error {
    background: var(--error-glow);
    border-color: rgba(255,77,106,0.25);
  }
  .warning-item.sev-warning {
    background: var(--warn-glow);
    border-color: rgba(245,166,35,0.25);
  }
  .warning-item.sev-info {
    background: rgba(124,157,255,0.06);
    border-color: rgba(124,157,255,0.15);
  }
  .warning-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .warning-body { flex: 1; min-width: 0; }
  .warning-type {
    font-size: 12px;
    font-weight: 700;
    font-family: var(--mono);
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .warning-item.sev-error .warning-type { color: var(--error); }
  .warning-item.sev-warning .warning-type { color: var(--warn); }
  .warning-item.sev-info .warning-type { color: var(--info); }
  .warning-detail { font-size: 13px; margin-bottom: 3px; }
  .warning-rec { font-size: 12px; color: var(--text-muted); }

  /* ─── Export Buttons ─── */
  .export-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .export-label {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
    margin-right: 4px;
  }
  .btn-export {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-family: var(--sans);
    transition: all 0.15s;
  }
  .btn-export:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
  .btn-export-csv:hover { border-color: var(--accent2); color: var(--accent2); background: var(--accent2-glow); }
  .btn-export-md:hover { border-color: var(--warn); color: var(--warn); background: var(--warn-glow); }

  /* ─── Empty / Loading ─── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state .empty-text { font-size: 14px; }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── No results ─── */
  .no-results {
    padding: 32px;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    font-family: var(--mono);
  }

  /* ─── Fade in ─── */
  .fade-in {
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ─── Tabs ─── */
  .tabs {
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .tab-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-btn.active.tab-warn { border-bottom-color: var(--warn); color: var(--warn); }
  .tab-btn.active.tab-tags { border-bottom-color: var(--accent2); color: var(--accent2); }
  .tab-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 11px;
    font-family: var(--mono);
    background: var(--surface2);
    color: var(--text-muted);
  }
  .tab-btn.active .tab-pill { background: var(--accent-glow); color: var(--accent); }
  .tab-btn.active.tab-warn .tab-pill { background: var(--warn-glow); color: var(--warn); }
  .tab-btn.active.tab-tags .tab-pill { background: var(--accent2-glow); color: var(--accent2); }

  /* ─── Summary tab content ─── */
  .summary-meta {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
    margin-bottom: 20px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .summary-meta span { display: flex; align-items: center; gap: 6px; }
  .summary-meta .meta-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); }

  /* ─── Responsive ─── */
  @media (max-width: 640px) {
    .app { padding: 0 12px 60px; }
    .header { flex-direction: column; align-items: flex-start; }
    .filter-input { min-width: 140px; }
    .tab-btn { padding: 10px 12px; font-size: 13px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
// ─── Minimal React helpers ───
const { createElement: h, useState, useCallback, useRef, useMemo } = React;

// ─────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────
function safeJsonParse(text) {
  try { return JSON.parse(text); } catch { return null; }
}

function createCountKey(event) {
  // 重複判定: 媒体 + 媒体ID + イベント名 の3要素のみ
  // ページURLやホストは含めない（同一ページかどうかに関わらず同一イベントとみなす）
  return [event.platform, event.platformId ?? "", event.eventName ?? ""]
    .map(s => String(s).trim().toLowerCase()).join("||");
}

const SENSITIVE_KEYS = new Set([
  "email","em","phone","ph","tel","address","name","first_name","last_name",
  "user_id","uid","cid","client_id","cookie","authorization"
]);
function maskSensitiveValue(key, value) {
  return SENSITIVE_KEYS.has(key.toLowerCase()) ? "[masked]" : value;
}

function downloadFile(content, fileName, mimeType, addBom = false) {
  const bom = addBom ? "\uFEFF" : "";
  const blob = new Blob([bom + content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = fileName;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function tsFileName(prefix, ext) {
  const now = new Date();
  const pad = n => String(n).padStart(2,"0");
  const d = [now.getFullYear(), pad(now.getMonth()+1), pad(now.getDate())].join("");
  const t = [pad(now.getHours()), pad(now.getMinutes()), pad(now.getSeconds())].join("");
  return `${prefix}-${d}-${t}.${ext}`;
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + " KB";
  return (bytes/(1024*1024)).toFixed(1) + " MB";
}

// ─────────────────────────────────────────────────────────────
// PARSER
// ─────────────────────────────────────────────────────────────
const MAX_SIZE = 50 * 1024 * 1024;

async function parseHARFile(file) {
  if (file.size > MAX_SIZE)
    return { ok: false, error: "ファイルサイズが上限を超えています。50MB以下のHARを指定してください。" };
  let text;
  try { text = await file.text(); } catch { return { ok: false, error: "ファイルの読み込みに失敗しました。" }; }
  const json = safeJsonParse(text);
  if (!json) return { ok: false, error: "HARファイルのJSON形式が不正です。" };
  if (!json.log) return { ok: false, error: "HARファイルのJSON形式が不正です。" };
  if (!Array.isArray(json.log.entries)) return { ok: false, error: "HARの log.entries が見つかりません。" };
  const entries = json.log.entries.filter(e => e?.request?.url && typeof e.request.url === "string");
  return { ok: true, file: json, entries };
}

function extractQueryParams(url) {
  const params = {};
  url.searchParams.forEach((v,k) => { params[k] = v; });
  return params;
}

function parseSearchString(s) {
  const params = {};
  try { new URLSearchParams(s).forEach((v,k) => { params[k] = v; }); } catch {}
  return params;
}

function flattenJson(obj, prefix="") {
  const result = {};
  for (const [key, value] of Object.entries(obj)) {
    const fullKey = prefix ? `${prefix}.${key}` : key;
    if (value === null || value === undefined) result[fullKey] = "";
    else if (typeof value === "object" && !Array.isArray(value))
      Object.assign(result, flattenJson(value, fullKey));
    else result[fullKey] = String(value);
  }
  return result;
}

function parsePostData(postData) {
  if (!postData?.text) return {};
  const mimeType = (postData.mimeType ?? "").toLowerCase();
  const text = postData.text;
  if (mimeType.includes("application/json") || mimeType.includes("text/json")) {
    const parsed = safeJsonParse(text);
    if (parsed && typeof parsed === "object") return flattenJson(parsed);
  }
  if (mimeType.includes("application/x-www-form-urlencoded")) return parseSearchString(text);
  const attempted = parseSearchString(text);
  if (Object.keys(attempted).length > 0) return attempted;
  return {};
}

// ─────────────────────────────────────────────────────────────
// DETECTORS
// ─────────────────────────────────────────────────────────────
function makeEvent(platform, partial, ctx) {
  const p = {
    platform,
    requestUrl: ctx.rawRequestUrl,
    requestHost: ctx.url.hostname,
    requestPath: ctx.url.pathname,
    method: ctx.method,
    status: ctx.status,
    startedDateTime: ctx.startedDateTime,
    rawParams: { ...ctx.queryParams, ...ctx.postParams },
    ...partial,
  };
  const countKey = createCountKey(p);
  return { id: crypto.randomUUID(), ...p, countKey };
}

// GA4
function detectGA4(ctx) {
  const host = ctx.url.hostname, path = ctx.url.pathname;
  const matchHost = host.includes("google-analytics.com") || host.includes("analytics.google.com");
  if (!matchHost || !path.includes("/g/collect")) return null;
  const params = { ...ctx.queryParams, ...ctx.postParams };
  return makeEvent("GA4", {
    platformId: params["tid"],
    eventName: params["en"],
    eventType: "event",
    pageUrl: params["dl"],
    rawParams: params,
  }, ctx);
}

// Google Ads
function extractAWId(path) {
  const m = path.match(/\/(?:pagead\/(?:conversion|viewthroughconversion|1p-conversion)|td\/rul)\/(\d+)/);
  return m?.[1];
}
function gadsEventInfo(path) {
  if (path.includes("viewthroughconversion")) return { name: "viewthrough_conversion", type: "conversion" };
  if (path.includes("1p-conversion") || path.includes("/pagead/conversion/")) return { name: "conversion", type: "conversion" };
  if (path.includes("/td/rul/")) return { name: "remarketing", type: "remarketing" };
  return { name: "google_ads_request", type: "remarketing" };
}
const GADS_HOSTS = ["googleadservices.com","googleads.g.doubleclick.net","doubleclick.net"];
const GADS_PATHS = ["/pagead/conversion/","/pagead/viewthroughconversion/","/pagead/1p-conversion/","/td/rul/"];
function detectGoogleAds(ctx) {
  const host = ctx.url.hostname, path = ctx.url.pathname;
  if (!GADS_HOSTS.some(h => host.includes(h))) return null;
  if (!GADS_PATHS.some(p => path.includes(p))) return null;
  const params = { ...ctx.queryParams, ...ctx.postParams };
  const convId = extractAWId(path);
  const { name, type } = gadsEventInfo(path);
  return makeEvent("Google Ads", {
    platformId: convId ? `AW-${convId}` : undefined,
    eventName: name, eventType: type,
    pageUrl: params["url"],
    rawParams: params,
  }, ctx);
}

// Meta
function detectMeta(ctx) {
  const host = ctx.url.hostname, path = ctx.url.pathname;
  if (!host.includes("facebook.com")) return null;
  if (!path.includes("/tr")) return null;
  const params = { ...ctx.queryParams, ...ctx.postParams };
  return makeEvent("Meta", {
    platformId: params["id"],
    eventName: params["ev"],
    eventType: "pixel_event",
    pageUrl: params["dl"],
    rawParams: params,
  }, ctx);
}

// Criteo
const CRITEO_MAP = { vh:"viewHome", vl:"viewList", vp:"viewItem", vb:"viewBasket", vc:"trackTransaction", ui:"userIdentification" };
function criteoEvent(params) {
  if (params["e"]) return CRITEO_MAP[params["e"]] || params["e"];
  for (let i = 1; i <= 5; i++) {
    const px = params[`p${i}`];
    if (!px) continue;
    try {
      const inner = parseSearchString(decodeURIComponent(px));
      if (inner["e"]) return CRITEO_MAP[inner["e"]] || inner["e"];
    } catch {}
  }
  return undefined;
}
function detectCriteo(ctx) {
  const host = ctx.url.hostname, path = ctx.url.pathname;
  if (!host.includes("criteo.com") || !path.includes("/event")) return null;
  const params = { ...ctx.queryParams, ...ctx.postParams };
  const eventName = criteoEvent(params);
  return makeEvent("Criteo", {
    platformId: params["a"],
    eventName,
    eventType: eventName === "trackTransaction" ? "conversion" : "remarketing",
    rawParams: params,
  }, ctx);
}

// LINE
const LINE_MAP = { pv:"PageView", cv:"Conversion", click:"Click" };
function detectLINE(ctx) {
  if (!ctx.url.hostname.includes("tr.line.me")) return null;
  const params = { ...ctx.queryParams, ...ctx.postParams };
  const rawEv = params["e"];
  return makeEvent("LINE", {
    platformId: params["t_id"],
    eventName: rawEv ? (LINE_MAP[rawEv] || rawEv) : undefined,
    eventType: rawEv === "cv" ? "conversion" : rawEv === "pv" ? "pageview" : "event",
    rawParams: params,
  }, ctx);
}

// Microsoft Ads
function detectMicrosoftAds(ctx) {
  const host = ctx.url.hostname, path = ctx.url.pathname;
  if (!host.includes("bat.bing.com") || !path.includes("/action/")) return null;
  const params = { ...ctx.queryParams, ...ctx.postParams };
  let eventName;
  if (params["evt"]) eventName = params["evt"];
  else if (params["ec"] || params["ea"]) eventName = [params["ec"],params["ea"]].filter(Boolean).join("/");
  return makeEvent("Microsoft Ads", {
    platformId: params["ti"],
    eventName,
    eventType: "uet",
    rawParams: params,
  }, ctx);
}

// Yahoo Ads
// タグ種別ごとにホスト・パス・パラメータを分けて判定する
//
// [YDN コンバージョン]  apm.yahoo.co.jp/c
//   platformId : yahoo_ydn_conv_io
//   label      : yahoo_ydn_conv_label
//
// [YDN リターゲティング]  b92.yahoo.co.jp / yjtag.yahoo.co.jp
//   platformId : yahoo_retargeting_id
//   label      : yahoo_retargeting_label
//
// [YSS コンバージョン]  s.yimg.jp 等
//   platformId : yahoo_conversion_id
//   label      : yahoo_conversion_label

function detectYahooAds(ctx) {
  const host = ctx.url.hostname;
  const path = ctx.url.pathname;
  const params = { ...ctx.queryParams, ...ctx.postParams };

  // YDN コンバージョン (apm.yahoo.co.jp/c)
  if (host === "apm.yahoo.co.jp" && path === "/c") {
    const convIo    = params["yahoo_ydn_conv_io"];
    const convLabel = params["yahoo_ydn_conv_label"];
    return makeEvent("Yahoo Ads", {
      platformId: convIo,
      eventName:  convLabel ? `conv_label:${convLabel}` : "ydn_conversion",
      eventType:  "conversion",
      rawParams:  params,
    }, ctx);
  }

  // YDN リターゲティング (b92.yahoo.co.jp / yjtag.yahoo.co.jp)
  if (host.includes("b92.yahoo.co.jp") || host.includes("yjtag.yahoo.co.jp")) {
    const retId    = params["yahoo_retargeting_id"];
    const retLabel = params["yahoo_retargeting_label"];
    const pageType = params["yahoo_retargeting_page_type"];
    const name     = retLabel
      ? `retargeting_label:${retLabel}`
      : pageType
        ? `retargeting_page:${pageType}`
        : "ydn_retargeting";
    return makeEvent("Yahoo Ads", {
      platformId: retId,
      eventName:  name,
      eventType:  "remarketing",
      rawParams:  params,
    }, ctx);
  }

  // YSS コンバージョン (s.yimg.jp 等、yahoo_conversion_id が存在する)
  if (host.includes("yimg.jp") || host.includes("yahoo.co.jp")) {
    const convId    = params["yahoo_conversion_id"];
    const convLabel = params["yahoo_conversion_label"];
    if (convId) {
      return makeEvent("Yahoo Ads", {
        platformId: convId,
        eventName:  convLabel ? `conv_label:${convLabel}` : "yss_conversion",
        eventType:  "conversion",
        rawParams:  params,
      }, ctx);
    }
    // それ以外の yahoo.co.jp / yimg.jp リクエスト（汎用フォールバック）
    return makeEvent("Yahoo Ads", {
      platformId: params["yclid"] || params["ysid"] || params["site_id"] || undefined,
      eventName:  undefined,
      eventType:  "yahoo_tag_request",
      rawParams:  params,
    }, ctx);
  }

  return null;
}

// TikTok
function detectTikTok(ctx) {
  const host = ctx.url.hostname, path = ctx.url.pathname;
  if (!host.includes("analytics.tiktok.com") || !path.includes("/pixel/track")) return null;
  const params = { ...ctx.queryParams, ...ctx.postParams };
  return makeEvent("TikTok", {
    platformId: params["pixel_code"],
    eventName: params["event"],
    eventType: "pixel_event",
    rawParams: params,
  }, ctx);
}

const DETECTORS = [detectGA4, detectGoogleAds, detectMeta, detectCriteo, detectLINE, detectMicrosoftAds, detectYahooAds, detectTikTok];

function detectTagEvent(ctx) {
  for (const det of DETECTORS) {
    const result = det(ctx);
    if (result) return result;
  }
  return null;
}

// ─────────────────────────────────────────────────────────────
// AGGREGATION
// ─────────────────────────────────────────────────────────────
function aggregateEvents(events) {
  const map = new Map();
  for (const ev of events) {
    const existing = map.get(ev.countKey);
    if (existing) {
      existing.count++;
      if (ev.status !== undefined) existing.statuses.push(ev.status);
      if (!existing.requestHosts.includes(ev.requestHost)) existing.requestHosts.push(ev.requestHost);
      existing.requestUrls.push(ev.requestUrl);
      existing.eventIds.push(ev.id);
    } else {
      map.set(ev.countKey, {
        countKey: ev.countKey,
        platform: ev.platform,
        platformId: ev.platformId,
        eventName: ev.eventName,
        eventType: ev.eventType,
        count: 1,
        statuses: ev.status !== undefined ? [ev.status] : [],
        pageUrl: ev.pageUrl,
        requestHosts: [ev.requestHost],
        requestUrls: [ev.requestUrl],
        eventIds: [ev.id],
        startedDateTime: ev.startedDateTime,
      });
    }
  }
  return Array.from(map.values()).sort((a,b) => {
    if (a.platform < b.platform) return -1;
    if (a.platform > b.platform) return 1;
    return (a.eventName??'').localeCompare(b.eventName??'');
  });
}

// ─────────────────────────────────────────────────────────────
// WARNINGS
// ─────────────────────────────────────────────────────────────
function analyzeWarnings(events, aggregated) {
  const warnings = [];
  // duplicate
  for (const agg of aggregated) {
    if (agg.count > 1) {
      warnings.push({
        id: crypto.randomUUID(), type: "duplicate_event", severity: "warning",
        platform: agg.platform, platformId: agg.platformId, eventName: agg.eventName,
        detail: `${agg.platform} / ${agg.platformId??'不明'} / ${agg.eventName??'不明'} が${agg.count}回発火しています。`,
        recommendation: "GTM PreviewやGTM / 媒体ヘルパーで二重発火の有無を確認してください。",
        relatedEventIds: agg.eventIds,
      });
    }
  }
  // http_error
  for (const ev of events) {
    if (ev.status !== undefined && ev.status >= 400) {
      warnings.push({
        id: crypto.randomUUID(), type: "http_error", severity: "error",
        platform: ev.platform, platformId: ev.platformId, eventName: ev.eventName,
        detail: `タグ通信がHTTPエラー (${ev.status}) を返しています。`,
        recommendation: "通信先URL、ブロッカー、CSP、タグ設定を確認してください。",
        relatedEventIds: [ev.id],
      });
    }
  }
  // missing_platform_id
  for (const ev of events) {
    if (!ev.platformId) {
      warnings.push({
        id: crypto.randomUUID(), type: "missing_platform_id", severity: "info",
        platform: ev.platform,
        detail: `${ev.platform} のタグ通信で媒体IDが取得できませんでした。`,
        recommendation: "タグの設定を確認し、正しいIDが埋め込まれているか確認してください。",
        relatedEventIds: [ev.id],
      });
    }
  }
  // missing_event_name
  for (const ev of events) {
    if (!ev.eventName) {
      warnings.push({
        id: crypto.randomUUID(), type: "missing_event_name", severity: "info",
        platform: ev.platform, platformId: ev.platformId,
        detail: `${ev.platform} のタグ通信でイベント名が取得できませんでした。`,
        recommendation: "タグの設定を確認し、イベント名が正しく送信されているか確認してください。",
        relatedEventIds: [ev.id],
      });
    }
  }
  // multiple_platform_ids
  const pidMap = new Map();
  for (const ev of events) {
    if (!ev.platformId) continue;
    if (!pidMap.has(ev.platform)) pidMap.set(ev.platform, new Set());
    pidMap.get(ev.platform).add(ev.platformId);
  }
  for (const [platform, ids] of pidMap.entries()) {
    if (ids.size > 1) {
      const related = events.filter(e => e.platform===platform && e.platformId).map(e=>e.id);
      warnings.push({
        id: crypto.randomUUID(), type: "multiple_platform_ids", severity: "warning",
        platform,
        detail: `${platform} で複数の媒体ID (${Array.from(ids).join(", ")}) が検出されました。`,
        recommendation: "複数IDが意図的な場合は問題ありませんが、誤設定がないか確認してください。",
        relatedEventIds: related,
      });
    }
  }
  return warnings;
}

// ─────────────────────────────────────────────────────────────
// INSPECTION RUNNER
// ─────────────────────────────────────────────────────────────
function runInspection(harFile, entries, fileName) {
  const tagEvents = [];
  for (const entry of entries) {
    const rawRequestUrl = entry.request.url;
    let url;
    try { url = new URL(rawRequestUrl); } catch { continue; }
    const ctx = {
      url,
      method: entry.request.method,
      status: entry.response?.status,
      startedDateTime: entry.startedDateTime,
      queryParams: extractQueryParams(url),
      postParams: parsePostData(entry.request.postData),
      rawRequestUrl,
      pageref: entry.pageref,
    };
    const ev = detectTagEvent(ctx);
    if (ev) tagEvents.push(ev);
  }
  const aggregatedEvents = aggregateEvents(tagEvents);
  const warnings = analyzeWarnings(tagEvents, aggregatedEvents);
  const platforms = new Set(tagEvents.map(e=>e.platform));
  return {
    summary: {
      totalRequests: entries.length,
      matchedRequests: tagEvents.length,
      detectedPlatforms: platforms.size,
      totalEvents: aggregatedEvents.length,
      warningCount: warnings.length,
      errorStatusCount: tagEvents.filter(e=>e.status>=400).length,
      duplicateEventCount: aggregatedEvents.filter(a=>a.count>1).length,
    },
    events: tagEvents,
    aggregatedEvents,
    warnings,
    metadata: {
      analyzedAt: new Date().toISOString(),
      fileName,
      harVersion: harFile.log.version,
      creatorName: harFile.log.creator?.name,
      creatorVersion: harFile.log.creator?.version,
      pageCount: harFile.log.pages?.length,
    },
  };
}

// ─────────────────────────────────────────────────────────────
// EXPORTERS
// ─────────────────────────────────────────────────────────────
function csvEscape(v) { return `"${String(v).replace(/"/g,'""')}"`; }
function exportCsv(aggregated) {
  const headers = ["platform","platformId","eventName","eventType","count","status","pageUrl","requestHost","requestUrl","startedDateTime"];
  const rows = [headers.map(csvEscape).join(",")];
  for (const agg of aggregated) {
    rows.push([
      agg.platform, agg.platformId??"", agg.eventName??"", agg.eventType??"",
      String(agg.count), agg.statuses.join("|"), agg.pageUrl??"",
      agg.requestHosts.join("|"), agg.requestUrls[0]??"", agg.startedDateTime??"",
    ].map(csvEscape).join(","));
  }
  return rows.join("\r\n");
}

function exportMarkdown(result) {
  const { summary: s, aggregatedEvents, warnings, metadata: m } = result;
  const lines = [
    "# HAR Tag Inspection Report","",
    `> Analyzed at: ${m.analyzedAt}`,
    m.fileName ? `> File: ${m.fileName}` : null,"",
    "## Summary","",
    `- Total Requests: ${s.totalRequests}`,
    `- Matched Tag Requests: ${s.matchedRequests}`,
    `- Detected Platforms: ${s.detectedPlatforms}`,
    `- Total Events: ${s.totalEvents}`,
    `- Warnings: ${s.warningCount}`,
    `- HTTP Errors: ${s.errorStatusCount}`,
    `- Duplicate Events: ${s.duplicateEventCount}`,"",
    "## Events","",
    "| Platform | ID | Event | Count | Status |",
    "|---|---|---:|---:|---:|",
    ...aggregatedEvents.map(a=>`| ${a.platform} | ${a.platformId??"-"} | ${a.eventName??"-"} | ${a.count} | ${a.statuses.join("/")||"-"} |`),
    "",
    ...(warnings.length>0 ? [
      "## Warnings","",
      ...warnings.flatMap(w=>{
        const icon = w.severity==="error"?"🔴":w.severity==="warning"?"🟡":"🔵";
        return [`### ${icon} ${w.type.replace(/_/g," ")}`,"",w.detail,"",`**Recommendation**: ${w.recommendation}`,""];
      })
    ] : []),
  ].filter(l=>l!==null);
  return lines.join("\n");
}

function exportJson(result) { return JSON.stringify(result, null, 2); }

// ─────────────────────────────────────────────────────────────
// COMPONENTS
// ─────────────────────────────────────────────────────────────

// Platform Badge
function PlatformBadge({ platform }) {
  const cls = `platform-badge badge-${platform.replace(/ /g,"-")}`;
  return h("span", { className: cls },
    h("span", { className: "platform-dot" }),
    platform
  );
}

// Status Badge
function StatusBadge({ statuses }) {
  if (!statuses || statuses.length === 0) return h("span", { className: "status-none" }, "—");
  const s = statuses[0];
  let cls = "status-badge ";
  if (s >= 500) cls += "status-5xx";
  else if (s >= 400) cls += "status-4xx";
  else if (s >= 300) cls += "status-3xx";
  else cls += "status-2xx";
  const unique = [...new Set(statuses)];
  return h("span", { className: cls }, unique.join("/"));
}

// Count Badge
function CountBadge({ count }) {
  return h("span", { className: `count-badge ${count > 1 ? "count-many" : "count-1"}` }, count);
}

// Copy Button
function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  const onClick = useCallback((e) => {
    e.stopPropagation();
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    });
  }, [text]);
  return h("button", { className: "copy-btn", onClick }, copied ? "✓ copied" : "copy");
}

// Param Chip
function ParamChip({ k, v }) {
  const masked = SENSITIVE_KEYS.has(k.toLowerCase());
  return h("span", { className: "param-chip" },
    h("span", { className: "param-key" }, k),
    h("span", { className: "param-sep" }, "="),
    h("span", { className: masked ? "param-val param-masked" : "param-val", title: masked ? "" : v },
      masked ? "[masked]" : v
    )
  );
}

// Detail Row
function DetailRow({ agg, colSpan }) {
  const MAX_PARAMS = 30;
  const entries = Object.entries(agg.rawParams ?? {}).slice(0, MAX_PARAMS);
  // Find the first event with rawParams
  const urlDisplay = agg.requestUrls[0] ?? "";

  return h("tr", { className: "detail-row" },
    h("td", { colSpan },
      h("div", { className: "detail-inner" },
        h("div", { className: "detail-grid" },
          agg.pageUrl && h("div", { className: "detail-item" },
            h("div", { className: "detail-label" }, "Page URL"),
            h("div", { className: "detail-value" }, agg.pageUrl)
          ),
          h("div", { className: "detail-item" },
            h("div", { className: "detail-label" }, "Request URL"),
            h("div", { className: "detail-value url-val" },
              h("span", { title: urlDisplay, style: { display:"block", maxWidth:400, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" } }, urlDisplay),
              h(CopyButton, { text: urlDisplay })
            )
          ),
          agg.eventType && h("div", { className: "detail-item" },
            h("div", { className: "detail-label" }, "Event Type"),
            h("div", { className: "detail-value" }, agg.eventType)
          ),
          agg.startedDateTime && h("div", { className: "detail-item" },
            h("div", { className: "detail-label" }, "Started At"),
            h("div", { className: "detail-value" }, new Date(agg.startedDateTime).toLocaleString("ja-JP"))
          ),
        ),
        entries.length > 0 && h("div", { className: "params-section" },
          h("div", { className: "params-title" }, `Raw Params (${entries.length})`),
          h("div", { className: "params-grid" },
            ...entries.map(([k, v]) => h(ParamChip, { key: k, k, v }))
          )
        )
      )
    )
  );
}

// Event Table
function EventTable({ aggregated, events }) {
  const [expandedKey, setExpandedKey] = useState(null);
  const [platformFilter, setPlatformFilter] = useState("all");
  const [showDupOnly, setShowDupOnly] = useState(false);
  const [showErrOnly, setShowErrOnly] = useState(false);
  const [search, setSearch] = useState("");

  const platforms = useMemo(() => {
    const ps = new Set(aggregated.map(a=>a.platform));
    return ["all", ...Array.from(ps).sort()];
  }, [aggregated]);

  // Build rawParams map: countKey → rawParams
  const rawParamsMap = useMemo(() => {
    const map = new Map();
    for (const ev of events) {
      if (!map.has(ev.countKey)) map.set(ev.countKey, ev.rawParams);
    }
    return map;
  }, [events]);

  const filtered = useMemo(() => {
    return aggregated.filter(a => {
      if (platformFilter !== "all" && a.platform !== platformFilter) return false;
      if (showDupOnly && a.count < 2) return false;
      if (showErrOnly && !a.statuses.some(s=>s>=400)) return false;
      if (search) {
        const q = search.toLowerCase();
        const haystack = [a.platform, a.platformId, a.eventName, a.pageUrl, a.requestHosts.join(" ")].join(" ").toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      return true;
    });
  }, [aggregated, platformFilter, showDupOnly, showErrOnly, search]);

  const toggleRow = (key) => setExpandedKey(prev => prev === key ? null : key);

  if (aggregated.length === 0) {
    return h("div", { className: "empty-state" },
      h("div", { className: "empty-icon" }, "📭"),
      h("div", { className: "empty-text" }, "広告・解析タグの通信は検出されませんでした。")
    );
  }

  const COL = 8;

  return h("div", { className: "fade-in" },
    // Filter Bar
    h("div", { className: "filter-bar" },
      h("select", {
        className: "filter-select",
        value: platformFilter,
        onChange: e => setPlatformFilter(e.target.value),
      }, platforms.map(p => h("option", { key: p, value: p }, p === "all" ? "All Platforms" : p))),
      h("input", {
        className: "filter-input",
        type: "text",
        placeholder: "Search event, ID, URL...",
        value: search,
        onChange: e => setSearch(e.target.value),
      }),
      h("div", {
        className: `filter-toggle ${showDupOnly ? "active" : ""}`,
        onClick: () => setShowDupOnly(v=>!v),
      }, "⚠ 重複のみ"),
      h("div", {
        className: `filter-toggle ${showErrOnly ? "active-err" : ""}`,
        onClick: () => setShowErrOnly(v=>!v),
      }, "🔴 エラーのみ"),
    ),
    // Table
    h("div", { className: "table-wrap" },
      filtered.length === 0
        ? h("div", { className: "no-results" }, "条件に一致するイベントがありません")
        : h("table", {},
          h("thead", {},
            h("tr", {},
              h("th", {}, "Platform"),
              h("th", {}, "Platform ID"),
              h("th", {}, "Event Name"),
              h("th", {}, "Count"),
              h("th", {}, "Status"),
              h("th", {}, "Page URL"),
              h("th", {}, "Request Host"),
              h("th", {}, ""),
            )
          ),
          h("tbody", {},
            ...filtered.flatMap(agg => {
              const expanded = expandedKey === agg.countKey;
              const enriched = { ...agg, rawParams: rawParamsMap.get(agg.countKey) ?? {} };
              const pageUrlDisplay = agg.pageUrl ? new URL(agg.pageUrl).pathname.slice(0,40) : "—";
              const rows = [
                h("tr", {
                  key: agg.countKey,
                  className: expanded ? "expanded" : "",
                  onClick: () => toggleRow(agg.countKey),
                },
                  h("td", { className: "td-platform" }, h(PlatformBadge, { platform: agg.platform })),
                  h("td", { className: "td-mono" }, agg.platformId ?? h("span", { style:{color:"var(--text-dim)"} }, "—")),
                  h("td", {}, agg.eventName ?? h("span", { style:{color:"var(--text-dim)"} }, "—")),
                  h("td", {}, h(CountBadge, { count: agg.count })),
                  h("td", {}, h(StatusBadge, { statuses: agg.statuses })),
                  h("td", { className: "td-mono", style:{fontSize:11,color:"var(--text-muted)"} },
                    agg.pageUrl
                      ? h("span", { title: agg.pageUrl }, pageUrlDisplay + (agg.pageUrl.length > 40 ? "…" : ""))
                      : h("span", { style:{color:"var(--text-dim)"} }, "—")
                  ),
                  h("td", { className: "td-mono", style:{fontSize:11,color:"var(--text-muted)"} }, agg.requestHosts[0] ?? "—"),
                  h("td", { style:{textAlign:"right",color:"var(--text-dim)",fontSize:12} }, expanded ? "▲" : "▼"),
                )
              ];
              if (expanded) {
                rows.push(h(DetailRow, { key: agg.countKey + "_detail", agg: enriched, colSpan: COL }));
              }
              return rows;
            })
          )
        )
    )
  );
}

// Warning Panel
function WarningPanel({ warnings }) {
  if (!warnings || warnings.length === 0) return null;
  const icon = { error: "🔴", warning: "🟡", info: "🔵" };
  const label = { duplicate_event:"二重発火", http_error:"HTTPエラー", missing_platform_id:"ID未取得", missing_event_name:"イベント名未取得", multiple_platform_ids:"複数ID検出", unknown_tag_request:"不明タグ" };
  return h("div", { className: "warning-panel fade-in" },
    h("div", { className: "section-header" },
      h("div", { className: "section-title" }, "⚠ Warnings"),
      h("span", { className: "section-count" }, `${warnings.length} 件`)
    ),
    ...warnings.map(w =>
      h("div", { key: w.id, className: `warning-item sev-${w.severity}` },
        h("div", { className: "warning-icon" }, icon[w.severity]),
        h("div", { className: "warning-body" },
          h("div", { className: "warning-type" },
            label[w.type] ?? w.type,
            w.platform ? ` — ${w.platform}` : "",
            w.platformId ? ` / ${w.platformId}` : "",
          ),
          h("div", { className: "warning-detail" }, w.detail),
          h("div", { className: "warning-rec" }, w.recommendation),
        )
      )
    )
  );
}

// Summary Cards
function SummaryCards({ summary, onTabChange }) {
  const cards = [
    { label: "Total Requests",  value: summary.totalRequests,       cls: "",                                          tab: null },
    { label: "Matched Tags",    value: summary.matchedRequests,     cls: summary.matchedRequests > 0 ? "ok" : "",     tab: "tags" },
    { label: "Platforms",       value: summary.detectedPlatforms,   cls: "",                                          tab: null },
    { label: "Unique Events",   value: summary.totalEvents,         cls: "",                                          tab: "tags" },
    { label: "Warnings",        value: summary.warningCount,        cls: summary.warningCount > 0 ? "warn" : "",      tab: "warnings" },
    { label: "HTTP Errors",     value: summary.errorStatusCount,    cls: summary.errorStatusCount > 0 ? "error" : "", tab: "warnings" },
    { label: "Duplicates",      value: summary.duplicateEventCount, cls: summary.duplicateEventCount > 0 ? "warn" : "", tab: "warnings" },
  ];
  return h("div", { className: "summary-grid" },
    ...cards.map(c => h("div", {
      key: c.label,
      className: `summary-card ${c.cls}`,
      style: c.tab ? { cursor: "pointer" } : {},
      onClick: c.tab ? () => onTabChange(c.tab) : undefined,
      title: c.tab ? (c.tab === "tags" ? "Matched Tagsタブへ" : "Warningsタブへ") : undefined,
    },
      h("div", { className: "summary-label" }, c.label),
      h("div", { className: "summary-value" }, c.value),
      c.tab && h("div", { style: { fontSize: 10, color: "var(--text-dim)", fontFamily: "var(--mono)", marginTop: 4 } }, "→ 詳細を見る"),
    ))
  );
}

// Export Buttons
function ExportButtons({ result }) {
  const doExport = (type) => {
    if (type === "csv") {
      downloadFile(exportCsv(result.aggregatedEvents), tsFileName("har-tag-inspection-result","csv"), "text/csv", true);
    } else if (type === "md") {
      downloadFile(exportMarkdown(result), tsFileName("har-tag-inspection-report","md"), "text/markdown");
    } else {
      downloadFile(exportJson(result), tsFileName("har-tag-inspection-result","json"), "application/json");
    }
  };
  return h("div", { className: "export-row fade-in" },
    h("span", { className: "export-label" }, "Export:"),
    h("button", { className: "btn-export btn-export-csv", onClick: () => doExport("csv") }, "⬇ CSV"),
    h("button", { className: "btn-export btn-export-md", onClick: () => doExport("md") }, "⬇ Markdown"),
    h("button", { className: "btn-export", onClick: () => doExport("json") }, "⬇ JSON"),
  );
}

// Upload Area
function UploadArea({ onFile }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef(null);

  const handleFile = useCallback((file) => {
    if (!file) return;
    if (!file.name.endsWith(".har") && !file.name.endsWith(".json")) {
      alert(".har または .json ファイルを選択してください。");
      return;
    }
    onFile(file);
  }, [onFile]);

  return h("div", {
    className: `upload-zone ${dragging ? "drag-over" : ""}`,
    onClick: () => inputRef.current?.click(),
    onDragOver: e => { e.preventDefault(); setDragging(true); },
    onDragLeave: () => setDragging(false),
    onDrop: e => {
      e.preventDefault(); setDragging(false);
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    },
  },
    h("div", { className: "upload-icon" }, "📂"),
    h("div", { className: "upload-title" }, "HARファイルをドロップ、またはクリックして選択"),
    h("div", { className: "upload-sub" }, ".har / .json  ·  最大50MB  ·  外部送信なし"),
    h("input", {
      ref: inputRef,
      className: "upload-input",
      type: "file",
      accept: ".har,.json",
      onChange: e => { if (e.target.files?.[0]) handleFile(e.target.files[0]); },
    })
  );
}

// ─────────────────────────────────────────────────────────────
// RESULTS TABS
// ─────────────────────────────────────────────────────────────
function ResultTabs({ result }) {
  const [activeTab, setActiveTab] = useState("summary");

  const tabDefs = [
    {
      id: "summary",
      label: "Summary",
      icon: "◈",
      cls: "",
      pill: null,
    },
    {
      id: "tags",
      label: "Matched Tags",
      icon: "⬡",
      cls: "tab-tags",
      pill: result.summary.matchedRequests,
    },
    {
      id: "warnings",
      label: "Warnings",
      icon: "⚠",
      cls: "tab-warn",
      pill: result.summary.warningCount,
    },
  ];

  const handleTabChange = (tab) => setActiveTab(tab);

  return h("div", {},
    // Summary cards — always visible above tabs
    h(SummaryCards, { summary: result.summary, onTabChange: handleTabChange }),

    // Tab bar
    h("div", { className: "tabs" },
      ...tabDefs.map(t =>
        h("button", {
          key: t.id,
          className: `tab-btn ${t.cls} ${activeTab === t.id ? "active" : ""}`,
          onClick: () => setActiveTab(t.id),
        },
          h("span", {}, t.icon + " " + t.label),
          t.pill !== null && h("span", { className: "tab-pill" }, t.pill),
        )
      )
    ),

    // Tab: Summary
    activeTab === "summary" && h("div", { className: "fade-in" },
      h("div", { className: "summary-meta" },
        h("span", {}, h("span", { className: "meta-dot" }), `Creator: ${result.metadata.creatorName ?? "—"} ${result.metadata.creatorVersion ?? ""}`),
        h("span", {}, h("span", { className: "meta-dot" }), `HAR v${result.metadata.harVersion ?? "—"}`),
        result.metadata.pageCount !== undefined && h("span", {}, h("span", { className: "meta-dot" }), `Pages: ${result.metadata.pageCount}`),
        h("span", {}, h("span", { className: "meta-dot" }), `Analyzed: ${new Date(result.metadata.analyzedAt).toLocaleString("ja-JP")}`),
      ),
      // Platform breakdown
      h("div", { className: "section-header", style: { marginTop: 8 } },
        h("div", { className: "section-title" }, "検出媒体"),
        h("span", { className: "section-count" }, `${result.summary.detectedPlatforms} platforms`),
      ),
      h("div", { style: { display:"flex", flexWrap:"wrap", gap:10, marginBottom:32 } },
        ...Array.from(new Set(result.events.map(e => e.platform))).sort().map(platform => {
          const count = result.aggregatedEvents.filter(a => a.platform === platform).length;
          return h("div", {
            key: platform,
            style: { display:"flex", alignItems:"center", gap:10, padding:"10px 16px", background:"var(--surface)", border:"1px solid var(--border)", borderRadius:10, cursor:"pointer" },
            onClick: () => setActiveTab("tags"),
          },
            h(PlatformBadge, { platform }),
            h("span", { style: { fontFamily:"var(--mono)", fontSize:13, color:"var(--text-muted)" } }, `${count} event${count !== 1 ? "s" : ""}`),
          );
        })
      ),
      h("div", { className: "section-header" },
        h("div", { className: "section-title" }, "解析情報"),
      ),
      h("div", { style: { display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))", gap:12, marginBottom:32 } },
        ...[
          ["総リクエスト数", result.summary.totalRequests],
          ["タグマッチ数", result.summary.matchedRequests],
          ["ユニークイベント数", result.summary.totalEvents],
          ["HTTP エラー数", result.summary.errorStatusCount],
          ["二重発火数", result.summary.duplicateEventCount],
          ["警告総数", result.summary.warningCount],
        ].map(([label, value]) =>
          h("div", { key: label, style: { background:"var(--surface)", border:"1px solid var(--border)", borderRadius:10, padding:"14px 16px" } },
            h("div", { style: { fontSize:11, color:"var(--text-muted)", fontFamily:"var(--mono)", marginBottom:4 } }, label),
            h("div", { style: { fontSize:22, fontWeight:800, letterSpacing:"-0.5px" } }, value),
          )
        )
      ),
      h(ExportButtons, { result }),
    ),

    // Tab: Matched Tags
    activeTab === "tags" && h("div", { className: "fade-in" },
      h(EventTable, { aggregated: result.aggregatedEvents, events: result.events }),
      h(ExportButtons, { result }),
    ),

    // Tab: Warnings
    activeTab === "warnings" && h("div", { className: "fade-in" },
      result.warnings.length === 0
        ? h("div", { className: "empty-state" },
            h("div", { className: "empty-icon" }, "✅"),
            h("div", { className: "empty-text" }, "警告はありません"),
          )
        : h(WarningPanel, { warnings: result.warnings }),
    ),
  );
}

// ─────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────
function App() {
  const [file, setFile] = useState(null);
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const handleFile = useCallback((f) => {
    setFile(f);
    setResult(null);
    setError(null);
  }, []);

  const handleRun = useCallback(async () => {
    if (!file) return;
    setLoading(true);
    setError(null);
    setResult(null);
    try {
      const parsed = await parseHARFile(file);
      if (!parsed.ok) { setError(parsed.error); setLoading(false); return; }
      if (parsed.entries.length === 0) { setError("HARの log.entries が見つかりません。"); setLoading(false); return; }
      const res = runInspection(parsed.file, parsed.entries, file.name);
      setResult(res);
    } catch (e) {
      setError("解析中にエラーが発生しました: " + e.message);
    } finally {
      setLoading(false);
    }
  }, [file]);

  const handleClear = () => {
    setFile(null); setResult(null); setError(null);
  };

  return h("div", { className: "app" },
    // Header
    h("header", { className: "header" },
      h("div", { className: "header-left" },
        h("div", { className: "logo" },
          h("div", { className: "logo-icon" }, "🔍"),
          h("div", { className: "logo-text" }, h("span", {}, "HAR"), " Tag Event Inspector"),
        ),
        h("div", { className: "header-sub" }, "HARから広告・解析タグの発火状況を媒体横断で一覧化する")
      ),
      h("div", { className: "privacy-badge" },
        "🔒",
        "ブラウザ内で完結・外部送信なし"
      )
    ),

    // Upload
    !file && h(UploadArea, { onFile: handleFile }),

    // File Info + Run
    file && h("div", {},
      h("div", { className: "file-info" },
        h("div", {},
          h("div", { className: "file-name" }, "📄 " + file.name),
          h("div", { className: "file-size" }, formatBytes(file.size)),
        ),
        h("div", { className: "file-actions" },
          h("button", { className: "btn btn-ghost", onClick: handleClear }, "✕ クリア"),
        )
      ),
      h("div", { className: "action-row" },
        h("button", {
          className: "btn btn-run",
          disabled: loading,
          onClick: handleRun,
        }, loading
          ? h("span", { style:{display:"flex",alignItems:"center",gap:8} }, h("span", { className: "spinner" }), "解析中...")
          : "▶  Run Inspection"
        ),
        result && h("span", { style:{fontSize:13,color:"var(--text-muted)",fontFamily:"var(--mono)"} },
          `${result.summary.matchedRequests} タグ検出 / ${result.summary.totalRequests} リクエスト中`
        )
      )
    ),

    // Error
    error && h("div", { className: "error-box" },
      h("span", {}, "⚠"),
      h("span", {}, error)
    ),

    // Results — tab UI
    result && h("div", { className: "fade-in" },
      h(ResultTabs, { result }),
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App, {}));
</script>
</body>
